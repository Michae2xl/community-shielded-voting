<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850" width="100%" height="100%">
    <defs>
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#242729" />
            <stop offset="100%" stop-color="#121415" />
        </radialGradient>
        
        <linearGradient id="shieldBorderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F4B728" />
            <stop offset="50%" stop-color="#D49A1C" />
            <stop offset="100%" stop-color="#A67812" />
        </linearGradient>

        <linearGradient id="shieldFillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1E2123" />
            <stop offset="100%" stop-color="#0F1011" />
        </linearGradient>

        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glowSmall" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <clipPath id="ballotSlotClip">
            <rect x="0" y="0" width="800" height="345" />
        </clipPath>
    </defs>

    <rect width="800" height="850" fill="url(#bgGrad)"/>

    <g stroke="#3A3F42" stroke-width="1.5" opacity="0.4">
        <line x1="150" y1="150" x2="300" y2="280" />
        <line x1="650" y1="180" x2="520" y2="300" />
        <line x1="180" y1="650" x2="320" y2="550" />
        <line x1="620" y1="620" x2="480" y2="540" />
        <circle cx="150" cy="150" r="4" fill="#F4B728" stroke="none"/>
        <circle cx="650" cy="180" r="4" fill="#F4B728" stroke="none"/>
        <circle cx="180" cy="650" r="4" fill="#F4B728" stroke="none"/>
        <circle cx="620" cy="620" r="4" fill="#F4B728" stroke="none"/>
    </g>

    <g font-family="monospace" font-size="12" fill="#3A3F42" opacity="0.6">
        <text x="80" y="280">proof_of_vote: 0x8f2a9...</text>
        <text x="580" y="450">z-addr: zs1x2y3z...</text>
        <text x="120" y="520">zk-SNARK_verify(true)</text>
    </g>

    <g transform="translate(0, 30)">
        <path d="M 400 240 L 620 200 L 590 460 C 590 600 400 720 400 720 C 400 720 210 600 210 460 L 180 200 Z"
              fill="url(#shieldFillGrad)" stroke="url(#shieldBorderGrad)" stroke-width="12" filter="url(#glow)"/>
        
        <path d="M 400 240 L 400 720 C 400 720 210 600 210 460 L 180 200 Z" fill="#FFFFFF" opacity="0.03" />
        
        <path d="M 400 265 L 590 232 L 565 455 C 565 575 400 685 400 685 C 400 685 235 575 235 455 L 210 232 Z"
              fill="none" stroke="#F4B728" stroke-width="2" opacity="0.5"/>
    </g>

    <g clip-path="url(#ballotSlotClip)">
        <rect x="310" y="100" width="180" height="240" rx="6" fill="#F8F9FA" stroke="#E2E8F0" stroke-width="2"/>
        
        <path d="M 490 140 L 450 100 L 490 100 Z" fill="#CBD5E1"/>
        <path d="M 450 100 L 450 140 L 490 140 Z" fill="#E2E8F0"/>

        <text x="400" y="135" font-family="'Segoe UI', Helvetica, sans-serif" font-size="14" fill="#121415" font-weight="bold" text-anchor="middle" letter-spacing="1">
            GOVERNANCE
        </text>
        <line x1="330" y1="145" x2="470" y2="145" stroke="#CBD5E1" stroke-width="2"/>

        <rect x="335" y="165" width="20" height="20" rx="3" fill="none" stroke="#94A3B8" stroke-width="2"/>
        <rect x="365" y="171" width="90" height="8" rx="4" fill="#E2E8F0"/>
        
        <rect x="335" y="205" width="20" height="20" rx="3" fill="none" stroke="#94A3B8" stroke-width="2"/>
        <rect x="365" y="211" width="70" height="8" rx="4" fill="#E2E8F0"/>

        <rect x="335" y="245" width="20" height="20" rx="3" fill="#FFFBEB" stroke="#F4B728" stroke-width="2"/>
        <rect x="365" y="251" width="85" height="8" rx="4" fill="#F4B728"/>
        <path d="M 338 255 L 343 260 L 358 242" stroke="#D49A1C" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        <rect x="350" y="290" width="100" height="24" rx="12" fill="#E8F4F0" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4 2"/>
        <text x="400" y="307" font-family="'Segoe UI', Helvetica, sans-serif" font-size="11" fill="#10B981" font-weight="bold" text-anchor="middle">
            🔒 SHIELDED
        </text>
    </g>

    <g transform="translate(0, 30)">
        <rect x="290" y="310" width="220" height="12" rx="6" fill="#050606" stroke="#3A3F42" stroke-width="2"/>
        <rect x="300" y="313" width="200" height="6" rx="3" fill="#000000"/>
        <path d="M 320 316 L 480 316" stroke="#F4B728" stroke-width="2" filter="url(#glowSmall)" opacity="0.8"/>
    </g>

    <g transform="translate(400, 520) scale(2.2)">
        <circle cx="0" cy="0" r="45" fill="#F4B728" filter="url(#glow)"/>
        
        <g fill="#FFFFFF">
            <path d="M -15,-16 L 15,-16 L 15,-8 L -2.5,14 L 15,14 L 15,22 L -15,22 L -15,14 L 2.5,-8 L -15,-8 Z" />
            
            <rect x="-3.5" y="-23" width="7" height="7" />
            <rect x="-3.5" y="22" width="7" height="7" />
        </g>
    </g>

    <text x="400" y="800" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="34" font-weight="bold" text-anchor="middle" fill="#FFFFFF" letter-spacing="5">
        ZCASH <tspan fill="#F4B728">SHIELDED VOTING</tspan>
    </text>
    <text x="400" y="830" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" text-anchor="middle" fill="#888888" letter-spacing="3" font-weight="bold">
        PRIVACY-PRESERVING GOVERNANCE
    </text>

</svg>
